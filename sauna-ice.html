<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=768">
<title>Tribe Sauna + Ice — Check In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep-teal: #325963;
    --sage-teal: #95C4BF;
    --soft-mint: #D9E9E1;
    --white: #ffffff;
    --off-white: #f7fbf9;
  }

  html, body {
    width: 768px;
    height: 1024px;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: var(--deep-teal);
    color: var(--white);
  }

  /* ── Page: vertical stack ── */
  .page {
    width: 768px;
    height: 1024px;
    display: grid;
    grid-template-rows: auto 1fr;
    position: relative;
    overflow: hidden;
  }

  /* ── Top panel (brand + headline) ── */
  .top {
    background: var(--deep-teal);
    padding: 52px 56px 44px;
    position: relative;
    z-index: 2;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }

  .brand-icon { width: 28px; height: 28px; }

  .brand-name {
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--sage-teal);
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--sage-teal);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .eyebrow::before {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--sage-teal);
    opacity: 0.6;
  }

  .headline {
    font-family: 'DM Serif Display', serif;
    font-size: 52px;
    line-height: 1.06;
    color: var(--white);
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }

  .headline em {
    font-style: normal;
    color: var(--sage-teal);
  }

  .subline {
    font-size: 14px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    line-height: 1.6;
  }

  .temp-row {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .temp-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(149,196,191,0.1);
    border: 1px solid rgba(149,196,191,0.2);
    border-radius: 100px;
    padding: 6px 14px;
  }

  .temp-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--sage-teal);
    flex-shrink: 0;
  }

  .temp-label {
    font-size: 11px;
    font-weight: 400;
    color: var(--sage-teal);
    letter-spacing: 0.04em;
  }

  /* Decorative rings bottom-left of top panel */
  .ring {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    border: 1px solid rgba(149,196,191,0.1);
  }
  .ring-1 { width: 260px; height: 260px; bottom: -100px; right: -60px; }
  .ring-2 { width: 160px; height: 160px; bottom: -60px; right: -20px; border-color: rgba(149,196,191,0.16); }
  .ring-3 { width: 80px;  height: 80px;  bottom: -20px; right: 20px;  border-color: rgba(149,196,191,0.22); }

  /* ── Bottom panel (form) ── */
  .bottom {
    background: var(--off-white);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 56px 48px;
    position: relative;
    overflow: hidden;
  }

  .bottom::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 80% 10%, rgba(149,196,191,0.13) 0%, transparent 60%);
    pointer-events: none;
  }

  .form-container {
    width: 100%;
    max-width: 460px;
    position: relative;
    z-index: 1;
  }

  /* ── Labels ── */
  .input-label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--deep-teal);
    opacity: 0.45;
    margin-bottom: 8px;
  }

  .input-group {
    margin-bottom: 12px;
  }

  /* ── Country dropdown ── */
  .country-select-wrapper {
    position: relative;
    display: block;
  }

  .country-select {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    background: white;
    border: 1.5px solid rgba(50,89,99,0.14);
    border-radius: 12px;
    padding: 13px 44px 13px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 400;
    color: var(--deep-teal);
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
    line-height: 1.4;
  }

  .country-select:focus { border-color: var(--sage-teal); }

  .country-arrow {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: rgba(50,89,99,0.35);
    display: flex;
    align-items: center;
  }

  /* ── Phone input ── */
  .phone-input {
    display: block;
    width: 100%;
    background: white;
    border: 1.5px solid rgba(50,89,99,0.14);
    border-radius: 12px;
    padding: 16px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--deep-teal);
    outline: none;
    letter-spacing: 0.05em;
    transition: border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
    text-align: center;
  }

  .phone-input::placeholder { color: rgba(50,89,99,0.2); }
  .phone-input:focus        { border-color: var(--sage-teal); }

  /* ── Keypad ── */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
    margin-bottom: 12px;
  }

  .key {
    background: white;
    border: 1.5px solid rgba(50,89,99,0.1);
    border-radius: 12px;
    padding: 16px 0;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--deep-teal);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, transform 0.1s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }

  .key-sub {
    display: block;
    font-size: 8px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(50,89,99,0.3);
    margin-top: 3px;
  }

  .key:active {
    background: var(--soft-mint);
    border-color: var(--sage-teal);
    transform: scale(0.95);
  }

  .key.back {
    background: transparent;
    border-color: rgba(50,89,99,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .key.back:active { background: #fce8e8; border-color: #f0aaaa; }

  /* ── Submit button ── */
  .submit-btn {
    width: 100%;
    background: var(--deep-teal);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 17px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s, transform 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    -webkit-tap-highlight-color: transparent;
  }

  .submit-btn:active { transform: scale(0.985); background: #253f47; }
  .submit-btn:disabled { opacity: 0.7; cursor: default; }

  .privacy-note {
    text-align: center;
    font-size: 11px;
    color: rgba(50,89,99,0.32);
    margin-top: 14px;
    font-weight: 300;
  }

  /* ── Success state ── */
  .success-state {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 14px;
  }

  .success-icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--soft-mint);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }

  .success-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--deep-teal);
  }

  .success-sub {
    font-size: 14px;
    color: rgba(50,89,99,0.5);
    font-weight: 300;
    line-height: 1.6;
    max-width: 280px;
  }

  .session-info {
    background: white;
    border: 1.5px solid rgba(50,89,99,0.1);
    border-radius: 14px;
    padding: 14px 22px;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .session-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--sage-teal);
    flex-shrink: 0;
  }

  .session-text {
    font-size: 14px;
    color: var(--deep-teal);
  }

  .session-text span { font-weight: 500; }
</style>
</head>

<script>
  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  const SUPABASE_URL      = 'https://hurctwfeueytlkpdrrpm.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1cmN0d2ZldWV5dGxrcGRycnBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1MjkzMjksImV4cCI6MjA5MzEwNTMyOX0.3sEwa9oeB-k1OQtrEu-_MMpUxvd5sCvmFOzBP_Xp52E';
  const TALLY_FORM_URL    = 'https://forms.tribesaunaice.com.au/waiver';
  const THANK_YOU_URL     = 'https://samquinntribe.github.io/tribe-kiosk/tribe-thankyou.html';

  // FEATURE FLAG: recognise Hapana clients even if they have no kiosk_profile yet.
  // Only enable AFTER confirming the Hapana waiver checkbox is legally sufficient.
  // When true, the kiosk checks the clients table on phone miss and auto-creates
  // a kiosk_profile from Hapana data. When false, only existing kiosk_profiles match.
  const CHECK_HAPANA_CLIENTS = false;
  // ─────────────────────────────────────────────────────────────────────────────

  // ─── Phone handling ──────────────────────────────────────────────────────────
  // AU (+61): strict 10 digits, format 04XX XXX XXX, placeholder 04__ ___ ___
  // All other countries: lenient 6–15 digits, generic 3-3-3-3 grouping

  const LENIENT_MIN = 6;
  const LENIENT_MAX = 15;
  const AU_LEN = 10;

  function formatPhone(d) {
    if (countryCode === '61') {
      // AU: 04XX XXX XXX
      if (d.length <= 4) return d;
      if (d.length <= 7) return d.slice(0,4) + ' ' + d.slice(4);
      return d.slice(0,4) + ' ' + d.slice(4,7) + ' ' + d.slice(7);
    }
    // All other countries: plain digits, no grouping
    return d;
  }

  function toE164(dialCode, d) {
    const stripped = d.startsWith('0') ? d.slice(1) : d;
    return '+' + dialCode + stripped;
  }

  function getMin() { return countryCode === '61' ? AU_LEN : LENIENT_MIN; }
  function getMax() { return countryCode === '61' ? AU_LEN : LENIENT_MAX; }

  function getPlaceholder() {
    return countryCode === '61' ? '04__ ___ ___' : 'Enter mobile number';
  }

  let digits = '';
  let countryCode = '61';

  const input       = document.getElementById('phoneInput');
  const formView    = document.getElementById('formView');
  const successView = document.getElementById('successView');
  const sessionTime = document.getElementById('sessionTime');
  const submitBtn   = document.getElementById('submitBtn');

  document.getElementById('countrySelect').addEventListener('change', function() {
    countryCode = this.value;
    digits = '';
    updateDisplay();
  });

  function updateDisplay() {
    input.placeholder = getPlaceholder();
    input.value = digits.length ? formatPhone(digits) : '';
  }

  document.getElementById('keypad').addEventListener('click', function(e) {
    const key = e.target.closest('.key');
    if (!key || key.id === 'backBtn') return;
    const val = key.dataset.val;
    if (val !== undefined && digits.length < getMax()) {
      digits += val;
      updateDisplay();
      pulseInput();
    }
  });

  document.getElementById('backBtn').addEventListener('click', function() {
    if (digits.length > 0) { digits = digits.slice(0,-1); updateDisplay(); }
  });

  function pulseInput() {
    input.style.transition = 'transform 0.08s';
    input.style.transform = 'scale(1.012)';
    setTimeout(() => { input.style.transform = 'scale(1)'; }, 80);
  }

  function shakeInput() {
    input.style.borderColor = '#e24b4a';
    let n = 0;
    const t = setInterval(() => {
      input.style.transform = n % 2 === 0 ? 'translateX(6px)' : 'translateX(-6px)';
      if (++n > 5) {
        clearInterval(t);
        input.style.transform = 'translateX(0)';
        setTimeout(() => { input.style.borderColor = ''; }, 400);
      }
    }, 60);
  }

  function setLoading(on) {
    submitBtn.disabled = on;
    submitBtn.innerHTML = on
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-dasharray="31.4" stroke-dashoffset="10"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/></circle></svg>'
      : 'Check in <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  }

  submitBtn.addEventListener('click', async function() {
    if (digits.length < getMin()) { shakeInput(); return; }

    const phone = toE164(countryCode, digits);
    setLoading(true);

    try {
      // First, look up if this phone has an existing profile + get the name
      const lookupRes = await fetch(
        `${SUPABASE_URL}/rest/v1/kiosk_profiles?select=id,first_name,last_name&phone_e164=eq.${encodeURIComponent(phone)}&limit=1`,
        { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
      );
      if (!lookupRes.ok) throw new Error('lookup failed');
      const profiles = await lookupRes.json();

      if (profiles.length > 0) {
        // ── Returning customer ── call checkin RPC to log visit + bump count
        const profile = profiles[0];
        const firstName = profile.first_name || '';

        // Save name to localStorage so thank-you page can personalise greeting
        try {
          localStorage.setItem('tribe_checkin_name', firstName);
          localStorage.setItem('tribe_checkin_at', Date.now().toString());
        } catch (e) { /* ignore */ }

        // Call checkin RPC — handles visit insertion + visit_count bump atomically
        fetch(`${SUPABASE_URL}/rest/v1/rpc/checkin`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({
            p_phone: phone,
            p_first_name: profile.first_name,
            p_last_name: profile.last_name
          })
        }).catch(err => console.error('Check-in RPC failed:', err));

        showSuccess(firstName);
        setTimeout(() => { window.location.href = THANK_YOU_URL; }, 1800);

      } else if (CHECK_HAPANA_CLIENTS) {
        // ── Flag is on ── check if this phone matches a Hapana client
        // The RPC handles the auto-creation server-side, but we still need the
        // name client-side to personalise the success screen + thank-you page.

        // Build the phone variants we need to check (Hapana stores some with leading 0)
        const phoneVariants = [
          phone,
          '+610' + phone.substring(3),    // +61XXX → +610XXX
          phone.substring(1)              // strip +
        ];
        const orFilter = phoneVariants.map(p => `phone_e164.eq.${encodeURIComponent(p)}`).join(',');

        const clientRes = await fetch(
          `${SUPABASE_URL}/rest/v1/clients?select=id,first_name,last_name&or=(${orFilter})&phone_e164=neq.%2B10000000000&limit=1`,
          { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
        );

        if (clientRes.ok) {
          const matchedClients = await clientRes.json();
          if (matchedClients.length > 0) {
            // Hapana client found — recognise them, RPC will auto-create the kiosk_profile
            const client = matchedClients[0];
            const firstName = client.first_name || '';

            try {
              localStorage.setItem('tribe_checkin_name', firstName);
              localStorage.setItem('tribe_checkin_at', Date.now().toString());
            } catch (e) { /* ignore */ }

            // Call checkin RPC with p_check_hapana=true so it creates the kiosk_profile
            fetch(`${SUPABASE_URL}/rest/v1/rpc/checkin`, {
              method: 'POST',
              headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=minimal'
              },
              body: JSON.stringify({
                p_phone: phone,
                p_check_hapana: true
              })
            }).catch(err => console.error('Hapana check-in RPC failed:', err));

            showSuccess(firstName);
            setTimeout(() => { window.location.href = THANK_YOU_URL; }, 1800);
            return;
          }
        }

        // No Hapana match either → Tally
        showRedirecting();
        setTimeout(() => { window.location.href = TALLY_FORM_URL; }, 400);

      } else {
        // ── New customer (Hapana check disabled) ── send to Tally
        showRedirecting();
        setTimeout(() => { window.location.href = TALLY_FORM_URL; }, 400);
      }

    } catch (err) {
      console.error(err);
      setLoading(false);
      shakeInput();
    }
  });

  function showRedirecting() {
    const titleEl = document.getElementById('successTitle');
    titleEl.textContent = "One moment…";
    const subEl = document.querySelector('.success-sub');
    if (subEl) subEl.textContent = "Opening waiver…";
    const sessionInfo = document.querySelector('.session-info');
    if (sessionInfo) sessionInfo.style.display = 'none';
    const doneBtn = document.getElementById('doneBtn');
    if (doneBtn) doneBtn.style.display = 'none';
    formView.style.display = 'none';
    successView.style.display = 'flex';
    successView.style.opacity = '0';
    successView.style.transform = 'translateY(12px)';
    setTimeout(() => {
      successView.style.transition = 'opacity 0.35s, transform 0.35s';
      successView.style.opacity = '1';
      successView.style.transform = 'translateY(0)';
    }, 20);
  }

  function showSuccess(firstName) {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    sessionTime.textContent = h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;

    // Personalise the greeting if we have a name
    const titleEl = document.getElementById('successTitle');
    if (firstName) {
      const cleanName = firstName.charAt(0).toUpperCase() + firstName.slice(1).toLowerCase();
      titleEl.textContent = `Thanks, ${cleanName}!`;
    } else {
      titleEl.textContent = "You're checked in";
    }

    formView.style.display = 'none';
    successView.style.display = 'flex';
    successView.style.opacity = '0';
    successView.style.transform = 'translateY(12px)';
    setTimeout(() => {
      successView.style.transition = 'opacity 0.35s, transform 0.35s';
      successView.style.opacity = '1';
      successView.style.transform = 'translateY(0)';
    }, 20);
  }

  document.getElementById('doneBtn').addEventListener('click', function() {
    digits = '';
    updateDisplay();
    setLoading(false);
    successView.style.display = 'none';
    formView.style.display = 'block';
    formView.style.opacity = '0';
    setTimeout(() => { formView.style.transition = 'opacity 0.3s'; formView.style.opacity = '1'; }, 20);
  });
</script>
